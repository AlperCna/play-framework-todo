# https://www.playframework.com/documentation/latest/Configuration

# === Dil / i18n ayarlari ===
# Uygulamada desteklenen diller. Listedeki ILK dil "hakim" (varsayilan) dildir:
# istek bir dil tercihi belirtmezse bu dil kullanilir ve "conf/messages.<dil>"
# dosyasindaki ceviriler gosterilir.
# Su an: Turkce (tr) hakim, Ingilizce (en) alternatif.
# Ingilizce'yi hakim yapmak icin sadece sirayi degistirin: ["en", "tr"]
play.i18n.langs = ["tr", "en"]
