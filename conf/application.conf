# https://www.playframework.com/documentation/latest/Configuration

# === Dil / i18n ayarlari ===
# Desteklenen diller (her biri bir "conf/messages.<dil>" dosyasina karsilik gelir).
# Play aktif dili her istekte su ONCELIK sirasiyla secer:
#   1. PLAY_LANG cookie'si      (varsa ve bu listede ise)
#   2. tarayicinin Accept-Language basligi  (bu listeden ilk eslesen)
#   3. listenin ilk elemani     (hicbiri eslesmezse fallback)  -> burada: tr
play.i18n.langs = ["tr", "en"]

# === Veritabani (Slick / Microsoft SQL Server) ===
# Repository'ler dev/prod'da gercek DB'ye baglanir. Testler Test modunda
# bellek-ici repo kullanir (bkz. app/Module.scala), bu yuzden test sirasinda
# asagidaki baglantiya HIC dokunulmaz (Slick baglantisi tembeldir/lazy).
#
# `profile` sonundaki `$` Slick'in profil object'ine isaret eder (zorunlu).
slick.dbs.default.profile = "slick.jdbc.SQLServerProfile$"
slick.dbs.default.db.driver = "com.microsoft.sqlserver.jdbc.SQLServerDriver"
slick.dbs.default.db.url = "jdbc:sqlserver://localhost:1433;databaseName=PlayTodoDb;encrypt=true;trustServerCertificate=true"
slick.dbs.default.db.user = "sa"
slick.dbs.default.db.password = "BP4329H42Jk#"

