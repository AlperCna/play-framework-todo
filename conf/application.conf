# Mona DRP — Application Configuration

play.i18n.langs = ["tr", "en"]

# === Uygulama modulleri ===
play.modules.enabled += "drp.boot.AppModule"

# === HTTP Guvenlik ===
play.http.secret.key = "dev-secret-please-change-32chars-min-000"
play.http.secret.key = ${?APP_SECRET}

# === HTTP Filtreleri ===
play.filters.enabled += "filters.AccessLogFilter"

# === Veritabani (Slick / PostgreSQL) ===
# Varsayilan degerler Docker Compose kurulumuna (port 55432) gore ayarlidir.
# Prod ortaminda SLICK_DB_URL / SLICK_DB_USER / SLICK_DB_PASSWORD env variable'lariyla ezilir.
slick.dbs.default.profile = "slick.jdbc.PostgresProfile$"
slick.dbs.default.db.driver = "org.postgresql.Driver"
slick.dbs.default.db.url = "jdbc:postgresql://localhost:55432/mona_drp"
slick.dbs.default.db.url = ${?SLICK_DB_URL}
slick.dbs.default.db.user = "mona"
slick.dbs.default.db.user = ${?SLICK_DB_USER}
slick.dbs.default.db.password = "mona_drp_secret"
slick.dbs.default.db.password = ${?SLICK_DB_PASSWORD}
