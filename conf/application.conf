# https://www.playframework.com/documentation/latest/Configuration

# === Dil / i18n ayarlari ===
# Desteklenen diller (her biri bir "conf/messages.<dil>" dosyasina karsilik gelir).
# Play aktif dili her istekte su ONCELIK sirasiyla secer:
#   1. PLAY_LANG cookie'si      (varsa ve bu listede ise)
#   2. tarayicinin Accept-Language basligi  (bu listeden ilk eslesen)
#   3. listenin ilk elemani     (hicbiri eslesmezse fallback)  -> burada: tr
play.i18n.langs = ["tr", "en"]

# === Uygulama modulleri (DI registry) ===
# Top-level Guice modulleri BURADA kaydedilir (sihirli isim-auto-load yerine acik
# kayit). Konvansiyon: config = top-level concern'lerin registry'si; her modul kendi
# ICINI `install(...)` ile kurar (bkz. modules.AppModule -> persistence + context).
#   - modules.AppModule      : domain wiring (Clock + backend secimi + context servisleri)
#   - modules.SecurityModule : pac4j auth          (asagida kendi bolumunde enable edilir)
#   - modules.CleanupModule  : zamanlanmis job'lar (asagida kendi bolumunde enable edilir)
play.modules.enabled += "todo.boot.AppModule"

# === Guvenlik / pac4j (form-login) ===
# Kimlik dogrulama pac4j FormClient + callback ile yapilir (bkz. todo.user.infrastructure.SecurityModule).
# secret.key: pac4j cookie session store'un AES sifrelemesi icin >= 16 karakter OLMALI
# (ShiroAesDataEncrypter secret.key'in ilk 16 karakterini kullanir).
play.http.secret.key = "dev-secret-please-change-32chars-min-000"
baseUrl = "http://localhost:9000"
play.modules.enabled += "todo.user.infrastructure.SecurityModule"

# === HTTP Filter'lar (cross-cutting) ===
# Play her istegi bir filter ZINCIRINDEN gecirir. Asagidaki satir, Play'in
# VARSAYILAN filtrelerini (CSRF, AllowedHosts, SecurityHeaders) KORUYARAK kendi
# erisim-logu/sure filtremizi zincirin SONUNA ekler. `=` yerine `+=` kullanmak
# kritik: `=` deseydik varsayilanlari (ve CSRF korumasini) silmis olurduk.
play.filters.enabled += "filters.AccessLogFilter"

# === Zamanlanmis bakim isleri ===
# Her gece tamamlanmis gorevleri soft-delete eden Akka Typed actor'unu acilista
# baslatir (bkz. todo.task.application.CompletedTaskCleaner / todo.task.application.CleanupModule).
play.modules.enabled += "todo.task.application.CleanupModule"

# === DRP modulleri ===
# Asset modulu (Protected Entity & Asset Registration). Kendi Guice binding'lerini kurar.
play.modules.enabled += "drp.asset.application.AssetModule"

# === Veritabani (Slick / Microsoft SQL Server) ===
# Repository'ler dev/prod'da gercek DB'ye baglanir. Testler Test modunda
# bellek-ici repo kullanir (bkz. app/Module.scala), bu yuzden test sirasinda
# asagidaki baglantiya HIC dokunulmaz (Slick baglantisi tembeldir/lazy).
#
# `profile` sonundaki `$` Slick'in profil object'ine isaret eder (zorunlu).
slick.dbs.default.profile = "slick.jdbc.SQLServerProfile$"
slick.dbs.default.db.driver = "com.microsoft.sqlserver.jdbc.SQLServerDriver"
slick.dbs.default.db.url = "jdbc:sqlserver://localhost:1433;databaseName=PlayTodoDb;encrypt=true;trustServerCertificate=true"
slick.dbs.default.db.user = "sa"
slick.dbs.default.db.password = "BP4329H42Jk#"

# Bellek-ici repo'ya zorlamak istersen (dev'de DB olmadan calistirmak icin):
# app.inMemory = true

# === DRP Veritabani (Slick / PostgreSQL) ===
# Todo iskelesinin `default` (SQL Server) baglantisindan AYRI, ikinci bir Slick veritabani.
# DRP repository'leri buna @NamedDatabase("drp") ile baglanir. Sema V001..V006 ile elle uygulanir
# (uygulama acilista migrate ETMEZ). Degerler `default` (SQL Server) baglantisindaki gibi acikca yazilidir
slick.dbs.drp.profile = "drp.shared.infrastructure.MonaPgProfile$"
slick.dbs.drp.db.driver = "org.postgresql.Driver"
slick.dbs.drp.db.url = "jdbc:postgresql://localhost:55432/mona_drp"
slick.dbs.drp.db.user = "mona"
slick.dbs.drp.db.password = "mona_drp_secret"

