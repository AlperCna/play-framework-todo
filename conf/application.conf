# https://www.playframework.com/documentation/latest/Configuration

# === Dil / i18n ayarlari ===
# Desteklenen diller (her biri bir "conf/messages.<dil>" dosyasina karsilik gelir).
# Play aktif dili her istekte su ONCELIK sirasiyla secer:
#   1. PLAY_LANG cookie'si      (varsa ve bu listede ise)
#   2. tarayicinin Accept-Language basligi  (bu listeden ilk eslesen)
#   3. listenin ilk elemani     (hicbiri eslesmezse fallback)  -> burada: tr
play.i18n.langs = ["tr", "en"]
